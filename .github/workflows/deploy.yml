name: Deploy to WeChat Cloud Run

on:
  workflow_dispatch: # 允许手动触发
  push:
    branches: [ main ]
    paths:
      - 'server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      WXCLOUD_APPID: ${{ secrets.WXCLOUD_APPID }}
      WXCLOUD_CLI_SECRET: ${{ secrets.WXCLOUD_CLI_SECRET }}
      WXCLOUD_ENVID: ${{ secrets.WXCLOUD_ENVID }}
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install @wxcloud/cli
        run: npm i -g @wxcloud/cli

      - name: Login wxcloud
        run: wxcloud login --appId "$WXCLOUD_APPID" --privateKey "$WXCLOUD_CLI_SECRET"

      - name: Deploy to Cloud Run
        run: |
          wxcloud run:deploy ./server \
            --envId="$WXCLOUD_ENVID" \
            --serviceName=express-37pl \
            --containerPort=3000 \
            --releaseType=FULL \
            --remark="v1.0.41 Auto deploy via GitHub Actions" \
            --noConfirm \
            --detach
